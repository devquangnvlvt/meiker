<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meiker Character Creator</title>
  <meta name="description" content="Tạo nhân vật Monster Girl ngay trên trình duyệt – chọn màu da, tóc, trang phục và xuất ảnh PNG.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="creator.css">
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div style="font-size:28px;margin-bottom:8px">🧙‍♀️</div>
  <div class="loader-ring"></div>
  <div class="loader-text" id="loaderText">Đang khởi động...</div>
  <div class="loader-progress">Monster Girl Maker</div>
</div>

<!-- Header -->
<header class="site-header">
  <h1 id="gameTitle">🎨 Meiker Creator</h1>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="randomize()" title="Random">🎲 Random</button>
    <button class="btn btn-ghost" onclick="resetAll()" title="Reset">↺ Reset</button>
    <button class="btn btn-primary" onclick="saveImage()">💾 Save PNG</button>
  </div>
</header>

<!-- App Body -->
<div class="app-body">

  <!-- Canvas Preview Area -->
  <div class="canvas-area">
    <span class="canvas-label">Canvas Preview</span>
    <div class="canvas-wrap" id="canvasWrap"
         style="width:min(600px, calc(100vw - 370px));height:min(600px, calc(100vh - 120px));">
      <canvas id="mainCanvas"></canvas>
    </div>
    <div class="canvas-tools">
      <button class="btn-icon-only" onclick="zoomIn()" title="Zoom in">＋</button>
      <button class="btn-icon-only" onclick="zoomOut()" title="Zoom out">－</button>
      <button class="btn-icon-only" onclick="zoomReset()" title="Fit">⊡</button>
    </div>
  </div>

  <!-- Control Panel -->
  <aside class="ctrl-panel">
    <!-- Category Tabs -->
    <div class="tabs-outer">
      <div class="cat-tabs" id="catTabs">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- Panel content area -->
    <div class="panel-content" id="panelContent">
      <!-- Filled by JS based on selected tab -->
    </div>
  </aside>

</div>

<script src="creator.js"></script>
</body>
</html>
